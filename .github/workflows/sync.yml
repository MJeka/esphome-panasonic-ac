name: Sync Fork

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync Fork with Upstream
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Клонируем репозиторий с токеном авторизации
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          
          # Настраиваемupstream и сливаем изменения
          git remote add upstream https://github.com/DomiStyle/esphome-panasonic-ac.git
          git fetch upstream
          git checkout master
          git merge upstream/master --no-edit --allow-unrelated-histories
          git push origin master
